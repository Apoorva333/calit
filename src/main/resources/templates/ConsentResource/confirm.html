{@java.lang.String title}
{@site.asm0dey.calit.domain.MeetingType type}
{@java.lang.String creatorName}
{@java.lang.String token}
{#include base title=title}
  <!-- CALIT_CONSENT_CONFIRM -->
  <div class="card bg-base-100 border border-base-300 shadow-sm max-w-xl mx-auto">
    <div class="card-body items-start gap-3">
      <h1 class="text-2xl font-bold">{msg:pub_consent_confirm_h1(type.name, creatorName)}</h1>
      <p class="text-base-content/70">{msg:pub_consent_confirm_desc}</p>
      <div class="flex gap-2">
        <form method="post" action="/consent/{token}">
          <input type="hidden" name="{inject:csrf.parameterName}" value="{inject:csrf.token}">
          <input type="hidden" name="action" value="accept">
          <button type="submit" class="btn btn-primary">{msg:pub_consent_accept_btn}</button>
        </form>
        <form method="post" action="/consent/{token}">
          <input type="hidden" name="{inject:csrf.parameterName}" value="{inject:csrf.token}">
          <input type="hidden" name="action" value="decline">
          <button type="submit" class="btn btn-outline">{msg:pub_consent_decline_btn}</button>
        </form>
      </div>
    </div>
  </div>
{/include}
