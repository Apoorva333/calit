# Group @QuarkusTest classes by their @TestProfile so same-profile classes run back-to-back.
# Under reuseForks=true each distinct profile costs one in-JVM Quarkus reboot (~2.3s); without
# ordering the profiles are scattered and Quarkus bounces default<->profile repeatedly. Batching
# collapses that to one reboot per distinct profile.
junit.jupiter.testclass.order.default=io.quarkus.test.junit.util.QuarkusTestProfileAwareClassOrderer
