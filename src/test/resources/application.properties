# Test-only auth: the admin user is seeded into the DB by FormAuth (admin/testpass)
# via the custom IdentityProviders. No embedded user store is used.

# With reuseForks=true, an @TestProfile test (e.g. BookPageTurnstileEnabledTest) restarts
# Quarkus in the same JVM. A fixed test port (default 8081) is not released fast enough on
# shutdown, so the restarted app fails with "Port already bound: 8081". Binding a random free
# port per start avoids the collision; @QuarkusTest auto-points RestAssured at the live port.
quarkus.http.test-port=0

# The mock mailer logs every sent email's full HTML body at INFO — ~5000 lines of noise
# per suite run. Flyway re-prints its migration list on every Quarkus boot. Silence both;
# tests assert on HTTP responses, not logs.
quarkus.log.category."quarkus-mailer".level=WARN
quarkus.log.category."org.flywaydb".level=WARN

# Keep the Dev Services Postgres container alive between local runs so repeated `mvn test`
# skips the ~35s cold container start. No-op on CI (fresh env) unless the runner also sets
# `testcontainers.reuse.enable=true` in ~/.testcontainers.properties.
quarkus.datasource.devservices.reuse=true
