# Test-only auth: the admin user is seeded into the DB by FormAuth (admin/testpass)
# via the custom IdentityProviders. No embedded user store is used.

# With reuseForks=true, an @TestProfile test (e.g. BookPageTurnstileEnabledTest) restarts
# Quarkus in the same JVM. A fixed test port (default 8081) is not released fast enough on
# shutdown, so the restarted app fails with "Port already bound: 8081". Binding a random free
# port per start avoids the collision; @QuarkusTest auto-points RestAssured at the live port.
quarkus.http.test-port=0
